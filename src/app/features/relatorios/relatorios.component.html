<app-cabecalho-pagina titulo="Relatórios" subtitulo="Configure os filtros e gere o arquivo necessário."><div class="exportar"><button class="botao secundario" (click)="exportar('Excel')">▦ Gerar Excel</button><button class="botao" (click)="exportar('PDF')">↓ Gerar PDF</button></div></app-cabecalho-pagina><section class="cartao filtros"><form [formGroup]="form" (ngSubmit)="gerar()"><label>Relatório<select formControlName="tipo"><option value="vendas-periodo">Vendas por período</option><option>Vendas por vendedor</option><option>Vendas por cliente</option><option>Vendas por região</option><option>Produtos mais vendidos</option><option>Estoque baixo</option></select></label><label>Data inicial<input type="date" formControlName="inicio"></label><label>Data final<input type="date" formControlName="fim"></label><label>Vendedor<select formControlName="vendedor"><option value="">Todos os vendedores</option>@for(vendedor of vendedores;track vendedor.id){<option [value]="vendedor.id">{{vendedor.nome}}</option>}</select></label><label>Cliente<select formControlName="cliente"><option value="">Todos os clientes</option>@for(cliente of clientes;track cliente.id){<option [value]="cliente.id">{{cliente.nome}}</option>}</select></label><label>Estado<select formControlName="estado" (change)="alterarEstado()"><option value="">Todos os estados</option>@for(estado of estados;track estado){<option [value]="estado">{{estado}}</option>}</select></label><label>Município<select formControlName="municipio" [disabled]="!form.controls.estado.value"><option value="">{{form.controls.estado.value?'Todos os municípios':'Selecione o estado'}}</option>@for(municipio of municipiosDisponiveis();track municipio){<option [value]="municipio">{{municipio}}</option>}</select></label><button class="botao">Preparar relatório</button></form></section>@if(toast()){<div class="toast">✓ {{toast()}}</div>}
