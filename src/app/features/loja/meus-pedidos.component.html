<app-cabecalho-pagina titulo="Meus Pedidos" subtitulo="Acompanhe orçamentos e pedidos enviados à fábrica."/><section class="cartao"><div class="filtros-loja"><select (change)="filtrar($any($event.target).value)"><option value="">Todos os status</option><option>RASCUNHO</option><option>ENVIADO</option><option>PENDENTE DE ANÁLISE</option><option>ACEITO</option><option>EM PRODUÇÃO</option><option>FATURADO</option><option>EM TRANSPORTE</option><option>FINALIZADO</option><option>RECUSADO</option><option>CANCELADO</option></select></div><div class="tabela-responsiva"><table><thead><tr><th>PEDIDO</th><th>DATA</th><th>VENDEDOR</th><th>ITENS</th><th>TOTAL</th><th>STATUS</th></tr></thead><tbody>@for(p of pedidos();track p.id){<tr><td><strong>{{p.numero}}</strong></td><td>{{p.data|date:'dd/MM/yyyy'}}</td><td>{{p.vendedorLojaNome}}</td><td>{{p.itens.length}}</td><td><strong>{{p.total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}}</strong></td><td><span [class]="'status '+p.status.toLowerCase()">{{p.status}}</span></td></tr>}@empty{<tr><td colspan="6">Nenhum pedido encontrado.</td></tr>}</tbody></table></div></section>
