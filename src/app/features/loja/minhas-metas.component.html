<app-cabecalho-pagina titulo="Minhas Metas" subtitulo="Acompanhe seu desempenho individual."/><section class="grade-kpis">@for(m of metas;track m.id){<article class="cartao kpi"><span>{{m.mesAno}}</span><strong>{{m.percentual}}%</strong><div class="progresso"><b [style.width.%]="m.percentual"></b></div><small>{{m.realizado.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}} de {{m.valorMeta.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}}</small></article>}@empty{<article class="cartao"><p>Nenhuma meta individual cadastrada para você.</p></article>}</section>
