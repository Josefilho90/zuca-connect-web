<app-cabecalho-pagina titulo="Catálogo da Fábrica" subtitulo="Calçados disponíveis para orçamento e pedido."/><div class="filtros-loja"><input #busca placeholder="Produto, referência, cor ou tamanho" (input)="filtrar(busca.value,categoria.value)"><select #categoria (change)="filtrar(busca.value,categoria.value)"><option value="">Todas as categorias</option>@for(c of categorias;track c){<option>{{c}}</option>}</select></div><section class="produtos-catalogo">@for(p of produtos();track p.id){<article class="cartao produto-loja"><div class="imagem">Z</div><h2>{{p.nome}}</h2><p>{{p.codigo}} · {{p.categoria}} · {{p.cor}} · Tam. {{p.tamanho}}</p><footer><strong>{{p.preco.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}}</strong><span class="status ativo">DISPONÍVEL</span></footer></article>}@empty{<p>Nenhum produto encontrado.</p>}</section>
